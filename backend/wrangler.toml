name = "crypto-pulse-backend"
main = "src/index.ts"
compatibility_date = "2024-05-29"
# Pin the account so Wrangler does not call /memberships to auto-discover it.
# Narrowly scoped API tokens cannot list memberships, which otherwise fails
# `wrangler deploy` with "Authentication error [code: 10000]".
account_id = "0ea8292ec77cc8fabb1bdc1b73127a19"
# Skip Wrangler telemetry network calls in CI.
send_metrics = false

# Workers AI binding — used to call Moonshot AI "Kimi K3" (moonshotai/kimi-k3)
# via env.AI.run(...). Workers AI is enabled on all Cloudflare plans by default.
[ai]
binding = "AI"

# Bind D1 Database
[[d1_databases]]
binding = "DB"
database_name = "crypto_pulse_db"
database_id = "15f49e2f-08bf-4dc5-8ec5-0860429fc0c4"
# Location of the D1 schema migration files applied via `wrangler d1 migrations apply`.
migrations_dir = "migrations"

[durable_objects]
bindings = [{ name = "TRADING_BOTS", class_name = "TradingBot" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TradingBot"]

[triggers]
crons = ["*/5 * * * *"]

# Deployed via GitHub Actions (deploy.yml). RESEND_API_KEY is set from the
# repo secret during the push-to-main deploy step.
