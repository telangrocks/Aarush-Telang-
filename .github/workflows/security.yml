name: Security - Vulnerability & Dependency Scanning

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # SNYK SECURITY SCANNING
  # ============================================================================
  snyk-scan:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-results.json

      - name: Upload Snyk results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-vulnerability-report
          path: snyk-results.json
          retention-days: 30

  # ============================================================================
  # DEPENDENCY CHECK (OWASP)
  # ============================================================================
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          path: '.'
          format: 'JSON'
          args: >
            --enableExperimental
            --enableVulnerability

      - name: Upload Dependency-Check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/dependency-check-report.json
          retention-days: 30

  # ============================================================================
  # NPM AUDIT - BACKEND & MOBILE
  # ============================================================================
  npm-audit:
    name: NPM Audit - Dependency Vulnerabilities
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
# Repository Migration & Canonical Project Setup

## Objective

I want to transition this Android project so that the **GitHub repository becomes the canonical (single source of truth)**.

From this point onward, all future development should be based on the repository. My local machine will only be used later to clone the repository, open it in Android Studio, build, debug, and test the application.

## Tasks

1. Perform a complete comparison between the local Android project and the repository workspace.
2. Identify every required source file, resource, Gradle file, manifest, asset, workflow, configuration, and dependency needed for a complete Android Studio project.
3. Copy or synchronize any missing project files from the local project into the repository workspace.
4. Preserve the existing directory structure.
5. Ensure that no required project files are omitted.
6. Exclude all machine-specific or generated content, including:

   * `local.properties`
   * `.gradle/`
   * `build/`
   * IDE caches
   * temporary files
   * signing keystores
   * secrets, tokens, credentials, or environment-specific files
7. Update any project configuration necessary so the repository workspace is internally consistent.
8. Validate that a fresh clone of this repository would contain everything required to open the project successfully in Android Studio after the normal machine-specific setup.

## Final Audit

Perform a complete verification and confirm:

* All Android source code is present.
* All resources are present.
* All Gradle configuration files are present.
* All manifests are present.
* All required assets are present.
* All GitHub workflows are present.
* All required project configuration files are present.
* There are no missing files required for a successful build.
* The repository workspace is complete and ready to become the project's canonical source.

## Important

* **Do not perform any Git operations** (no commit, push, pull, merge, rebase, branch creation, or pull request).
* Only prepare the repository workspace.
* Leave all changes uncommitted.

## Deliverables

When finished, provide:

1. A complete list of files that were migrated.
2. A list of files intentionally excluded and the reason.
3. Any remaining issues.
4. Any recommendations before the first commit.
5. A final confirmation stating whether the repository workspace is ready to become the canonical project and can later be cloned into Android Studio for building and testing.
        working-directory: ['backend']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './${{ matrix.working-directory }}/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ matrix.working-directory }}
        run: npm audit --audit-level=high


  # ============================================================================
  # SECRET SCANNING
  # ============================================================================
  secret-scan:
    name: Secret & Credential Detection
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: GitGuardian Secret Scan
        uses: gitguardian/ggshield-action@master
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

  # ============================================================================
  # LICENSE COMPLIANCE CHECK
  # ============================================================================
  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        working-directory: ['backend']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './${{ matrix.working-directory }}/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm ci

      - name: Check license compliance
        working-directory: ${{ matrix.working-directory }}
        run: npx license-checker --production --onlyAllow "MIT;Apache-2.0;ISC;BSD-3-Clause;BSD-2-Clause;CC0-1.0;0BSD" --summary > license-report.md

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report-${{ matrix.working-directory }}
          path: ${{ matrix.working-directory }}/license-report.md
          retention-days: 30

  # ============================================================================
  # SAST - STATIC APPLICATION SECURITY TESTING
  # ============================================================================
  sast-scan:
    name: SAST - Code Security Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: 'javascript,typescript'

      - name: Build CodeQL
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: '/language:javascript'

  # ============================================================================
  # CONTAINER SECURITY (if using Docker)
  # ============================================================================
  container-scan:
    name: Container Image Security Scan
    runs-on: ubuntu-latest
    if: hashFiles('**/Dockerfile') != ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cryptopulse:latest .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'cryptopulse:latest'
          format: 'sarif'
          output: 'trivy-container-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-container-results.sarif'

  # ============================================================================
  # SECURITY REPORT SUMMARY
  # ============================================================================
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [snyk-scan, dependency-check, npm-audit, secret-scan, license-check, sast-scan, container-scan]
    if: always() # This job should always run to provide a summary
    
    steps:
      - name: Generate security summary
        run: |
          echo "==================================="
          echo "🔐 Security Scan Summary"
          echo "==================================="
          echo "Snyk Scan:           ${{ needs.snyk-scan.result }}"
          echo "Dependency Check:    ${{ needs.dependency-check.result }}"
          echo "NPM Audit:           ${{ needs.npm-audit.result }}"
          echo "Secret Scan:         ${{ needs.secret-scan.result }}"
          echo "License Check:       ${{ needs.license-check.result }}"
          echo "SAST Analysis:       ${{ needs.sast-scan.result }}"
          # The container-scan result is only included if the job was not skipped
          if [ "${{ needs.container-scan.result }}" != "" ]; then
            echo "Container Scan:      ${{ needs.container-scan.result }}"
          else
            echo "Container Scan:      SKIPPED"
          fi
          echo "==================================="
          echo "Check the individual job logs for details."
          echo "Artifacts are available for download in the Actions tab."
          echo "==================================="

      - name: Fail if any security check failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "❌ One or more security checks failed, were cancelled, or skipped unexpectedly."
          exit 1
