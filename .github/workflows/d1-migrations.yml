name: D1 migrations

# Runs D1 schema operations non-interactively using the CLOUDFLARE_API_TOKEN
# secret. The account is pinned via CLOUDFLARE_ACCOUNT_ID so Wrangler does not
# call /memberships (which a narrowly scoped token cannot access and which
# previously failed with Authentication error [code: 10000]).

on:
  workflow_dispatch:
    inputs:
      action:
        description: Action to run against the production D1 database
        required: true
        default: apply
        type: choice
        options:
          - apply
          - list
          - generate-sql
      sql_command:
        description: SQL to run when action is 'list' (used as a one-off query)
        required: false
        default: "SELECT name FROM sqlite_master WHERE type='table' ORDER BY name;"

concurrency:
  group: d1-migrations-${{ github.ref }}
  cancel-in-progress: false

env:
  CLOUDFLARE_ACCOUNT_ID: "0ea8292ec77cc8fabb1bdc1b73127a19"

jobs:
  d1-production:
    name: Manage production D1 schema
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Cloudflare API token
        if: ${{ inputs.action != 'generate-sql' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
        run: test -n "$CLOUDFLARE_API_TOKEN" || { echo "CLOUDFLARE_WORKERS_API_TOKEN is required"; exit 1; }

      - name: Install Wrangler
        if: ${{ inputs.action != 'generate-sql' }}
        run: npm install -g wrangler@4

      - name: Apply D1 migrations (remote)
        if: ${{ inputs.action == 'apply' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
        run: wrangler d1 migrations apply crypto_pulse_db --config wrangler.toml --remote

      - name: Show D1 migration status
        if: ${{ inputs.action == 'apply' || inputs.action == 'list' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
        run: wrangler d1 migrations list crypto_pulse_db --config wrangler.toml --remote

      - name: Inspect remote D1 schema
        if: ${{ inputs.action == 'list' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
        run: wrangler d1 execute crypto_pulse_db --config wrangler.toml --remote --command "${{ inputs.sql_command }}"

      - name: Generate D1 migration SQL (manual apply fallback)
        if: ${{ inputs.action == 'generate-sql' }}
        run: bash scripts/print-d1-migration-sql.sh
