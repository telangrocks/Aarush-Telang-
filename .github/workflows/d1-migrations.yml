name: D1 migrations

# Automated remote D1 migrations are disabled because the CI Cloudflare API
# token cannot perform D1 write operations (`wrangler d1 migrations apply
# --remote` fails with Authentication error [code: 10000]). Until the token is
# granted D1 write access, this workflow only GENERATES the SQL that must be
# applied manually in the Cloudflare Dashboard (D1 -> crypto_pulse_db ->
# Console). It never contacts the Cloudflare API, so it always succeeds.

on:
  workflow_dispatch:

concurrency:
  group: d1-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  d1-generate-sql:
    name: Generate D1 migration SQL for manual apply
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate D1 migration SQL (manual apply required)
        run: bash scripts/print-d1-migration-sql.sh
