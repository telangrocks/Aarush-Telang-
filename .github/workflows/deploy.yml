name: Deploy backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    name: Build, migrate, and deploy backend
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --run

      - name: Verify Wrangler config
        env:
          WRANGLER_API_TOKEN: ${{ secrets.WRANGLER_API_TOKEN }}
        run: |
          test -n "$WRANGLER_API_TOKEN" || { echo "WRANGLER_API_TOKEN is required"; exit 1; }
          grep -q "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" wrangler.toml && { echo "wrangler.toml still has placeholder D1 database_id"; exit 1; } || true

      - name: Install Wrangler
        run: npm install -g wrangler@3.63.1

      - name: List D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.WRANGLER_API_TOKEN }}
        run: wrangler d1 migrations list crypto_pulse_db --config wrangler.toml --remote

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.WRANGLER_API_TOKEN }}
        run: wrangler d1 migrations apply crypto_pulse_db --config wrangler.toml --remote

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
        run: wrangler deploy --config wrangler.toml

      - name: Post-deploy smoke test
        env:
          WORKER_URL: https://crypto-pulse-backend.telangrocks.workers.dev
        run: npm run test:smoke
