name: Deploy backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    name: Build and deploy backend
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --run

      - name: Verify Cloudflare API token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
        run: test -n "$CLOUDFLARE_API_TOKEN" || { echo "CLOUDFLARE_WORKERS_API_TOKEN is required"; exit 1; }

      - name: Install Wrangler
        run: npm install -g wrangler@4

      # The following steps deploy to production and only run on pushes to
      # main. Pull requests run the lint/build/test gate above without
      # touching the live Worker or database.
      - name: Apply D1 migrations (remote)
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "0ea8292ec77cc8fabb1bdc1b73127a19"
        run: wrangler d1 migrations apply crypto_pulse_db --config wrangler.toml --remote

      - name: Show D1 migration status
        if: github.event_name == 'push'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "0ea8292ec77cc8fabb1bdc1b73127a19"
        run: wrangler d1 migrations list crypto_pulse_db --config wrangler.toml --remote

      - name: Deploy Worker
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "0ea8292ec77cc8fabb1bdc1b73127a19"
        run: wrangler deploy --config wrangler.toml

      # Apply the required runtime secrets. Each step is guarded so the deploy
      # only attempts to set a secret when it is defined as a GitHub secret;
      # this keeps the worker's required env vars (JWT_SECRET, ENCRYPTION_KEY,
      # RESEND_API_KEY, ALLOWED_ORIGINS) in sync with production on every push.
      - name: Set JWT_SECRET
        if: github.event_name == 'push' && secrets.JWT_SECRET != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: echo "$JWT_SECRET" | wrangler secret put JWT_SECRET --config wrangler.toml

      - name: Set ENCRYPTION_KEY
        if: github.event_name == 'push' && secrets.ENCRYPTION_KEY != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: echo "$ENCRYPTION_KEY" | wrangler secret put ENCRYPTION_KEY --config wrangler.toml

      - name: Set RESEND_API_KEY
        if: github.event_name == 'push' && secrets.RESEND_API_KEY != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: echo "$RESEND_API_KEY" | wrangler secret put RESEND_API_KEY --config wrangler.toml

      - name: Set ALLOWED_ORIGINS
        if: github.event_name == 'push' && secrets.ALLOWED_ORIGINS != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
        run: echo "$ALLOWED_ORIGINS" | wrangler secret put ALLOWED_ORIGINS --config wrangler.toml

      - name: Set FCM server key
        if: github.event_name == 'push' && secrets.FCM_SERVER_KEY != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          FCM_SERVER_KEY: ${{ secrets.FCM_SERVER_KEY }}
        run: echo "$FCM_SERVER_KEY" | wrangler secret put FCM_SERVER_KEY --config wrangler.toml

      - name: Post-deploy smoke test
        if: github.event_name == 'push'
        env:
          WORKER_URL: https://crypto-pulse-backend.telangrocks.workers.dev
        run: node -e "fetch(process.env.WORKER_URL + '/health').then(async (res) => { const body = await res.text(); if (res.status !== 200) { console.error(body); process.exit(1); } console.log(body); }).catch((err) => { console.error(err); process.exit(1); })"
