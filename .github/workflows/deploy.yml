name: Deploy backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  actions: write

env:
  CLOUDFLARE_ACCOUNT_ID: "0ea8292ec77cc8fabb1bdc1b73127a19"

jobs:
  deploy-backend:
    name: Build and deploy backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --run

      - name: Verify Cloudflare API token
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
        run: test -n "$CLOUDFLARE_API_TOKEN" || { echo "CLOUDFLARE_WORKERS_API_TOKEN is required"; exit 1; }

      # The following steps deploy to production and only run on pushes to
      # main. Pull requests run the lint/build/test gate above without
      # touching the live Worker or database.
      - name: Apply D1 migrations (remote)
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "0ea8292ec77cc8fabb1bdc1b73127a19"
        run: npx wrangler d1 migrations apply crypto_pulse_db --config wrangler.toml --remote

      - name: Show D1 migration status
        if: github.event_name == 'push'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "0ea8292ec77cc8fabb1bdc1b73127a19"
        run: npx wrangler d1 migrations list crypto_pulse_db --config wrangler.toml --remote

      - name: Deploy Worker
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "0ea8292ec77cc8fabb1bdc1b73127a19"
        run: npx wrangler deploy --config wrangler.toml

      - name: Set JWT_SECRET
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ -n "$JWT_SECRET" ]; then
            echo "$JWT_SECRET" | npx wrangler secret put JWT_SECRET --config wrangler.toml
          fi

      - name: Set ENCRYPTION_KEY
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          if [ -n "$ENCRYPTION_KEY" ]; then
            echo "$ENCRYPTION_KEY" | npx wrangler secret put ENCRYPTION_KEY --config wrangler.toml
          fi

      - name: Set RESEND_API_KEY
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -n "$RESEND_API_KEY" ]; then
            echo "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY --config wrangler.toml
          fi

      - name: Set ALLOWED_ORIGINS
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
        run: |
          if [ -n "$ALLOWED_ORIGINS" ]; then
            echo "$ALLOWED_ORIGINS" | npx wrangler secret put ALLOWED_ORIGINS --config wrangler.toml
          fi

      - name: Set FCM server key
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          FCM_SERVER_KEY: ${{ secrets.FCM_SERVER_KEY }}
        run: |
          if [ -n "$FCM_SERVER_KEY" ]; then
            echo "$FCM_SERVER_KEY" | npx wrangler secret put FCM_SERVER_KEY --config wrangler.toml
          fi

      - name: Set FCM v1 Project ID
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
        run: |
          if [ -n "$FCM_PROJECT_ID" ]; then
            echo "$FCM_PROJECT_ID" | npx wrangler secret put FCM_PROJECT_ID --config wrangler.toml
          fi

      - name: Set FCM v1 Client Email
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          FCM_CLIENT_EMAIL: ${{ secrets.FCM_CLIENT_EMAIL }}
        run: |
          if [ -n "$FCM_CLIENT_EMAIL" ]; then
            echo "$FCM_CLIENT_EMAIL" | npx wrangler secret put FCM_CLIENT_EMAIL --config wrangler.toml
          fi

      - name: Set FCM v1 Private Key
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          FCM_PRIVATE_KEY: ${{ secrets.FCM_PRIVATE_KEY }}
        run: |
          if [ -n "$FCM_PRIVATE_KEY" ]; then
            echo "$FCM_PRIVATE_KEY" | npx wrangler secret put FCM_PRIVATE_KEY --config wrangler.toml
          fi

      - name: Post-deploy smoke test
        if: github.event_name == 'push'
        env:
          WORKER_URL: https://crypto-pulse-backend.telangrocks.workers.dev
          CLOUDFLARE_ACCOUNT_ID: "0ea8292ec77cc8fabb1bdc1b73127a19"
        run: node -e "fetch(process.env.WORKER_URL + '/health').then(async (res) => { const body = await res.text(); if (res.status !== 200) { console.error(body); process.exit(1); } console.log(body); }).catch((err) => { console.error(err); process.exit(1); })"
