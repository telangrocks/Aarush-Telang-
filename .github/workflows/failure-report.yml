name: Failure report

on:
  workflow_run:
    workflows:
      - CI
      - Deploy backend
      - Security
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  collect-failure-report:
    name: Collect workflow failure report
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Create report directory
        run: mkdir -p failure-report

      - name: Build workflow failure summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.payload.workflow_run.id;
            const run = context.payload.workflow_run;

            const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });

            const jobs = jobsResponse.data.jobs;
            const failedJobs = jobs.filter(job => job.conclusion === 'failure');

            let report = '';
            report += `# Workflow Failure Report\n\n`;
            report += `- Workflow: ${run.name}\n`;
            report += `- Run ID: ${runId}\n`;
            report += `- Conclusion: ${run.conclusion}\n`;
            report += `- Branch: ${run.head_branch}\n`;
            report += `- Commit: ${run.head_sha}\n`;
            report += `- Event: ${run.event}\n`;
            report += `- URL: ${run.html_url}\n\n`;

            report += `## Failed Jobs\n\n`;
            if (failedJobs.length === 0) {
              report += `No failed jobs were detected, but the workflow concluded with failure.\n`;
            }

            for (const job of failedJobs) {
              report += `### ${job.name}\n`;
              report += `- Status: ${job.status}\n`;
              report += `- Conclusion: ${job.conclusion}\n`;
              report += `- Started: ${job.started_at}\n`;
              report += `- Completed: ${job.completed_at}\n\n`;

              const failedSteps = (job.steps || []).filter(step => step.conclusion === 'failure');
              if (failedSteps.length > 0) {
                report += `#### Failed Steps\n`;
                for (const step of failedSteps) {
                  report += `- ${step.name}\n`;
                }
                report += `\n`;
              }
            }

            fs.writeFileSync('failure-report/summary.md', report);

      - name: Download workflow logs
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: gh api repos/$REPO/actions/runs/$RUN_ID/logs > failure-report/workflow-logs.zip

      - name: Upload failure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: workflow-failure-report-${{ github.event.workflow_run.id }}
          path: failure-report
          retention-days: 14
