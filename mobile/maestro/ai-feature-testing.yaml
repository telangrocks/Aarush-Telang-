# Crypto Pulse — Android AI Feature Testing (standalone, live end-to-end journey)
#
# Runs the COMPLETE production user experience against the REAL backend
# (Cloudflare Worker) and LIVE exchange market data. It is driven by the
# standalone "Android AI Feature Testing" workflow. Every assertion uses
# stable Modifier.testTag() IDs (added to the app specifically for this flow)
# so important UI validations are NOT silently skipped. The companion backend
# script (backend/scripts/feature-testing-validation.js) independently verifies
# that the REAL backend completed each business operation.
#
# Phases 1–11 of the product journey are covered. Stages that depend on the
# live trading engine use scrollUntilVisible with long timeouts so the flow
# confirms each stage ACTUALLY completed before continuing — it does not simply
# assert the next screen appeared.
#
# Secrets injected by the workflow:
#   EXCHANGE_API_KEY / EXCHANGE_API_SECRET / EXCHANGE_NAME / EXCHANGE_ENVIRONMENT
appId: com.cryptopulse

config:
  continueOnFailure: false
  screenshotOnFailure: true
  screenshotOnCompletion: true

env:
  EXCHANGE_NAME: ${EXCHANGE_NAME}
  EXCHANGE_ENVIRONMENT: ${EXCHANGE_ENVIRONMENT}

flows:
  # ---------------------------------------------------------- PHASE 1
  - name: Phase 1 - Application Startup & Authentication
    steps:
      - launchApp:
          clearState: true
      - assertVisible:
          id: "com.cryptopulse:id/splash_root"
        optional: true
      - assertVisible: "CRYPTOPULSE"
      - assertVisible: "TRADE SMART. STAY AHEAD."
      # Auth (login with seeded QA credentials)
      - tapOn:
          id: "com.cryptopulse:id/auth_email_input"
      - inputText: "qa_user@cryptopulse.dev"
      - tapOn:
          id: "com.cryptopulse:id/auth_password_input"
      - inputText: "QaPassw0rd!2026"
      - tapOn:
          id: "com.cryptopulse:id/auth_sign_in_button"
      # Successful navigation to dashboard / candidates
      - assertVisible:
          id: "com.cryptopulse:id/market_candidates_list"
        optional: true
      - assertVisible: "TOP 10 SHORTLISTED"
      - screenshot: p1-startup-auth

  # ---------------------------------------------------------- PHASE 2
  - name: Phase 2 - Exchange Connectivity (valid + invalid)
    steps:
      - launchApp:
          clearState: true
      - tapOn: "Connect Exchange"
        optional: true
      - assertVisible:
          id: "com.cryptopulse:id/connect_exchange_root"
      - tapOn:
          id: "com.cryptopulse:id/exchange_dropdown"
      - tapOn: ${EXCHANGE_NAME}
      - tapOn:
          id: "com.cryptopulse:id/api_key_input"
      - inputText: ${EXCHANGE_API_KEY}
      - tapOn:
          id: "com.cryptopulse:id/api_secret_input"
      - inputText: ${EXCHANGE_API_SECRET}
      - tapOn:
          id: "com.cryptopulse:id/exchange_connect_button"
      # Genuine connection -> dashboard with live candidates
      - assertVisible:
          id: "com.cryptopulse:id/market_candidates_list"
      - assertVisible: "TOP 10 SHORTLISTED"
      - screenshot: p2-connect-valid
      # Invalid-credential handling
      - launchApp:
          clearState: true
      - tapOn: "Connect Exchange"
        optional: true
      - tapOn:
          id: "com.cryptopulse:id/exchange_dropdown"
      - tapOn: ${EXCHANGE_NAME}
      - tapOn:
          id: "com.cryptopulse:id/api_key_input"
      - inputText: "invalid_key_for_testing"
      - tapOn:
          id: "com.cryptopulse:id/api_secret_input"
      - inputText: "invalid_secret_for_testing"
      - tapOn:
          id: "com.cryptopulse:id/exchange_connect_button"
      # Error state surfaced (snackbar / retry)
      - assertVisible: "Validate & Connect"
        optional: true
      - screenshot: p2-connect-invalid

  # ---------------------------------------------------------- PHASE 3
  - name: Phase 3 - Live Market Data (real exchange data)
    steps:
      - launchApp:
          clearState: true
      - assertVisible:
          id: "com.cryptopulse:id/market_candidates_list"
      # Real prices rendered per candidate
      - assertVisible:
          id: "com.cryptopulse:id/candidate_item"
      - scrollUntilVisible:
          element:
            id: "com.cryptopulse:id/candidate_item"
          direction: DOWN
        optional: true
      - screenshot: p3-live-market-data

  # ---------------------------------------------------------- PHASE 4
  - name: Phase 4 - Intraday Market Scanner (Top 10)
    steps:
      - launchApp:
          clearState: true
      - assertVisible:
          id: "com.cryptopulse:id/market_candidates_list"
      - assertVisible:
          id: "com.cryptopulse:id/candidate_item"
      - screenshot: p4-scanner-top10

  # ---------------------------------------------------------- PHASE 5
  - name: Phase 5 - Strategy Selection
    steps:
      - launchApp:
          clearState: true
      - tapOn:
          id: "com.cryptopulse:id/candidate_item"
      - assertVisible:
          id: "com.cryptopulse:id/strategy_selection_root"
      - assertVisible: "SELECT STRATEGY"
      - screenshot: p5-strategy-selection

  # ---------------------------------------------------------- PHASE 6
  - name: Phase 6 - Trade Setup (calculations)
    steps:
      - launchApp:
          clearState: true
      - tapOn:
          id: "com.cryptopulse:id/candidate_item"
      - tapOn:
          id: "com.cryptopulse:id/strategy_option_scalping"
      - tapOn:
          id: "com.cryptopulse:id/trade_setup_proceed_button"
      - assertVisible:
          id: "com.cryptopulse:id/trade_setup_root"
      - assertVisible: "TRADE SETUP"
      - tapOn:
          id: "com.cryptopulse:id/trade_setup_position_size"
      - inputText: "100"
      - tapOn:
          id: "com.cryptopulse:id/trade_setup_proceed_button"
      - screenshot: p6-trade-setup

  # ---------------------------------------------------------- PHASE 7
  - name: Phase 7 - Strategy Execution
    steps:
      - launchApp:
          clearState: true
      - tapOn:
          id: "com.cryptopulse:id/candidate_item"
      - tapOn:
          id: "com.cryptopulse:id/strategy_option_scalping"
      - tapOn:
          id: "com.cryptopulse:id/trade_setup_proceed_button"
      - tapOn:
          id: "com.cryptopulse:id/trade_setup_proceed_button"
      - assertVisible: "TECHNICAL ANALYSIS"
      - screenshot: p7-strategy-execution

  # ---------------------------------------------------------- PHASE 8/9
  - name: Phase 8-9 - Live Bot Dashboard & Signal Generation
    steps:
      - launchApp:
          clearState: true
      - tapOn:
          id: "com.cryptopulse:id/candidate_item"
      - tapOn:
          id: "com.cryptopulse:id/trade_setup_proceed_button"
      - tapOn:
          id: "com.cryptopulse:id/strategy_start_analysis_button"
        optional: true
      - tapOn:
          id: "com.cryptopulse:id/trade_confirm_button"
        optional: true
      # Wait for the live analysis engine to reach the dashboard
      - assertVisible:
          id: "com.cryptopulse:id/live_analysis_root"
        timeout: 60000
      # Engine genuinely progressing (progress bar present + advancing)
      - assertVisible:
          id: "com.cryptopulse:id/live_analysis_progress_bar"
      - assertVisible:
          id: "com.cryptopulse:id/live_analysis_timeframes_header"
      # Wait for the live engine to raise a real signal (not mocked)
      - scrollUntilVisible:
          element:
            text: "TRADE DETECTED!"
          direction: DOWN
          timeout: 300000
      - assertVisible: "A valid trading opportunity has been identified."
      - assertVisible:
          id: "com.cryptopulse:id/trade_alert_header"
      - screenshot: p8-9-bot-signal

  # ---------------------------------------------------------- PHASE 10
  - name: Phase 10 - Trade Execution
    steps:
      - launchApp:
          clearState: true
      - tapOn:
          id: "com.cryptopulse:id/candidate_item"
      - tapOn:
          id: "com.cryptopulse:id/trade_setup_proceed_button"
      - tapOn:
          id: "com.cryptopulse:id/strategy_start_analysis_button"
        optional: true
      - tapOn:
          id: "com.cryptopulse:id/trade_confirm_button"
        optional: true
      - scrollUntilVisible:
          element:
            text: "TRADE DETECTED!"
          direction: DOWN
          timeout: 300000
      - tapOn:
          id: "com.cryptopulse:id/trade_alert_trade_button"
      # Live P&L dashboard appears after execution
      - assertVisible:
          id: "com.cryptopulse:id/live_pnl_root"
        timeout: 30000
      - screenshot: p10-trade-execution

  # ---------------------------------------------------------- PHASE 11
  - name: Phase 11 - Live P&L Dashboard
    steps:
      - launchApp:
          clearState: true
      - tapOn: "Positions"
        optional: true
      - assertVisible:
          id: "com.cryptopulse:id/positions_root"
      - assertVisible: "TRADE POSITIONS"
      # Live P&L values synced from backend
      - assertVisible:
          id: "com.cryptopulse:id/live_pnl_price"
        optional: true
      - assertVisible:
          id: "com.cryptopulse:id/live_pnl_value"
        optional: true
      - screenshot: p11-live-pnl
